# Servidor MySQL
db.host=127.0.0.1
db.port=3306
db.name=control_asistencia

# Opciones de conexion JDBC
db.useSSL=false
db.serverTimezone=Europe/Madrid
db.encoding=UTF-8
db.allowPublicKeyRetrieval=true

# Usuarios MySQL por rol
db.empleado.user=empleado
db.empleado.pass=Empleado#2024!

db.rrhh.user=rrhh
db.rrhh.pass=RRHH#2024!

db.admin.user=admin_app
db.admin.pass=Admin#2024!

# Pool de conexiones por rol
db.pool.min=2
db.pool.max=10
db.pool.timeoutSegundos=30